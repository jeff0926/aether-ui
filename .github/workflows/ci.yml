name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Size Check
        run: npm run test:size

      - name: Unit Tests
        run: npm test -- --run

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  size-report:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Report kernel size
        run: |
          SIZE=$(gzip -c dist/aether-kernel.min.js | wc -c)
          echo "## Kernel Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Raw | $(wc -c < dist/aether-kernel.min.js) bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Gzipped | $SIZE bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | 2048 bytes |" >> $GITHUB_STEP_SUMMARY
          if [ $SIZE -le 2048 ]; then
            echo "| Status | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
