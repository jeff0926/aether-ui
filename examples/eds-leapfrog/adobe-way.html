<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adobe Way | EDS Leapfrog Demo</title>
  <link rel="stylesheet" href="blocks/eds-blocks.css">

  <!-- React (simulating Adobe's approach) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; }

    .page-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .metrics-bar {
      background: #2c2c2c;
      color: white;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: monospace;
      font-size: 0.85rem;
    }

    .metric { display: flex; align-items: center; gap: 0.5rem; }
    .metric-label { color: #999; }
    .metric-value { color: #ff6b6b; font-weight: 600; }
    .metric-value.good { color: #69db7c; }

    .section-title {
      font-size: 1.5rem;
      color: var(--eds-text);
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--eds-border);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .alerts-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--eds-border);
      border-top-color: var(--eds-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 1rem;
      color: var(--eds-text-muted);
      font-size: 0.9rem;
    }

    .approach-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fce8e8;
      color: var(--eds-danger);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-left: 1rem;
    }
  </style>
</head>
<body>
  <!-- Loading Overlay (simulates React hydration) -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Hydrating React components...</p>
  </div>

  <!-- Metrics Bar -->
  <div class="metrics-bar">
    <div class="metric">
      <span class="metric-label">JS Payload:</span>
      <span class="metric-value">~40 KB</span>
    </div>
    <div class="metric">
      <span class="metric-label">Hydration Time:</span>
      <span class="metric-value" id="hydration-time">measuring...</span>
    </div>
    <div class="metric">
      <span class="metric-label">Render Count:</span>
      <span class="metric-value" id="render-count">0</span>
    </div>
    <div class="metric">
      <span class="metric-label">Main Thread:</span>
      <span class="metric-value">Blocked</span>
    </div>
  </div>

  <!-- EDS Navigation -->
  <nav class="eds-nav">
    <a href="index.html" class="eds-nav__brand">
      <svg class="eds-nav__logo" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#1473e6" stroke-width="2"/>
        <path d="M10 16h12M16 10v12" stroke="#1473e6" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>EDS Leapfrog</span>
    </a>
    <ul class="eds-nav__links">
      <li><a href="index.html" class="eds-nav__link">Home</a></li>
      <li><a href="adobe-way.html" class="eds-nav__link eds-nav__link--active">Adobe Way</a></li>
      <li><a href="aether-way.html" class="eds-nav__link">Aether Way</a></li>
      <li><a href="side-by-side.html" class="eds-nav__link">Compare</a></li>
    </ul>
    <div class="eds-nav__actions">
      <span class="approach-badge">React + EDS</span>
    </div>
  </nav>

  <!-- React App Root -->
  <div id="app"></div>

  <script type="text/babel">
    const hydrationStart = performance.now();
    let renderCount = 0;

    // Simulated data that would come from API/CMS
    const initialData = {
      cards: [
        { id: 1, title: 'Getting Started', description: 'Learn the basics of EDS components and how to integrate them with your React application.', image: 'https://via.placeholder.com/400x200/1473e6/ffffff?text=Getting+Started' },
        { id: 2, title: 'Component Library', description: 'Explore the full range of EDS components available for building enterprise experiences.', image: 'https://via.placeholder.com/400x200/2d9d78/ffffff?text=Components' },
        { id: 3, title: 'Design Tokens', description: 'Understand how to use design tokens for consistent styling across your application.', image: 'https://via.placeholder.com/400x200/e68619/ffffff?text=Tokens' },
      ],
      alerts: [
        { id: 1, type: 'info', title: 'System Update', message: 'Scheduled maintenance tonight at 11pm PST.' },
        { id: 2, type: 'success', title: 'Deployment Complete', message: 'Version 2.4.1 has been successfully deployed.' },
        { id: 3, type: 'warning', title: 'Performance Notice', message: 'High traffic detected. Response times may be affected.' },
      ],
      hero: {
        eyebrow: 'Traditional Approach',
        title: 'React + EDS Blocks',
        subtitle: 'This page uses React 18 to hydrate EDS components. Watch the metrics bar to see hydration time and render cycles.'
      }
    };

    // EDS Card Component (React)
    function EDSCard({ title, description, image }) {
      renderCount++;
      return (
        <div className="eds-card">
          <img className="eds-card__image" src={image} alt={title} />
          <div className="eds-card__content">
            <h3 className="eds-card__title">{title}</h3>
            <p className="eds-card__description">{description}</p>
          </div>
        </div>
      );
    }

    // EDS Alert Component (React)
    function EDSAlert({ type, title, message }) {
      renderCount++;
      const icons = {
        info: '\u2139\uFE0F',
        success: '\u2705',
        warning: '\u26A0\uFE0F',
        danger: '\u274C'
      };
      return (
        <div className={`eds-alert eds-alert--${type}`}>
          <span className="eds-alert__icon">{icons[type]}</span>
          <div className="eds-alert__content">
            <h4 className="eds-alert__title">{title}</h4>
            <p className="eds-alert__message">{message}</p>
          </div>
        </div>
      );
    }

    // EDS Hero Component (React)
    function EDSHero({ eyebrow, title, subtitle }) {
      renderCount++;
      return (
        <section className="eds-hero" style={{ '--hero-bg-start': '#d7373f', '--hero-bg-end': '#b82e35' }}>
          <div className="eds-hero__content">
            <p className="eds-hero__eyebrow">{eyebrow}</p>
            <h1 className="eds-hero__title">{title}</h1>
            <p className="eds-hero__subtitle">{subtitle}</p>
            <div className="eds-hero__actions">
              <a href="aether-way.html" className="eds-button eds-button--primary">Try Aether Instead</a>
              <a href="side-by-side.html" className="eds-button eds-button--secondary">Compare Performance</a>
            </div>
          </div>
        </section>
      );
    }

    // Main App
    function App() {
      const [data, setData] = React.useState(initialData);
      const [updateCount, setUpdateCount] = React.useState(0);

      // Simulate SSE updates (React way - re-render entire component tree)
      React.useEffect(() => {
        const eventSource = new EventSource('/api/sse?namespace=eds-demo');

        eventSource.onmessage = (event) => {
          const pulse = JSON.parse(event.data);

          // React approach: update state, trigger re-render
          if (pulse.content) {
            setData(prev => ({
              ...prev,
              alerts: prev.alerts.map((alert, i) =>
                i === 0 ? { ...alert, title: pulse.content['alert-title'] || alert.title, message: pulse.content['alert-body'] || alert.message } : alert
              )
            }));
            setUpdateCount(c => c + 1);
          }
        };

        return () => eventSource.close();
      }, []);

      React.useEffect(() => {
        document.getElementById('render-count').textContent = renderCount;
      });

      return (
        <>
          <EDSHero {...data.hero} />

          <div className="page-content">
            <h2 className="section-title">Content Cards</h2>
            <div className="cards-grid">
              {data.cards.map(card => (
                <EDSCard key={card.id} {...card} />
              ))}
            </div>

            <h2 className="section-title">Live Alerts (SSE Updates)</h2>
            <div className="alerts-stack">
              {data.alerts.map(alert => (
                <EDSAlert key={alert.id} {...alert} />
              ))}
            </div>
          </div>
        </>
      );
    }

    // Simulate hydration delay
    setTimeout(() => {
      const root = ReactDOM.createRoot(document.getElementById('app'));
      root.render(<App />);

      // Hide loading overlay and show hydration time
      setTimeout(() => {
        const hydrationTime = (performance.now() - hydrationStart).toFixed(0);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('hydration-time').textContent = hydrationTime + ' ms';
      }, 100);
    }, 300); // Simulate bundle parse time
  </script>
</body>
</html>
