<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <style>
    .box { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; }
    .box-red { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.5; }
    .box-green { fill: #f0fdf4; stroke: #22c55e; stroke-width: 1.5; }
    .box-blue { fill: #f0f9ff; stroke: #0ea5e9; stroke-width: 1.5; }
    .arrow { fill: none; stroke: #94a3b8; stroke-width: 1.5; marker-end: url(#arr); }
    .arrow-blue { fill: none; stroke: #0ea5e9; stroke-width: 2; stroke-dasharray: 4 2; marker-end: url(#arr-b); }
    .label { font-family: system-ui, sans-serif; font-size: 10px; fill: #334155; }
    .title { font-family: system-ui, sans-serif; font-size: 11px; fill: #1e293b; font-weight: 600; }
    .sub { font-family: monospace; font-size: 8px; fill: #94a3b8; }
    .divider { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 2; }
  </style>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#94a3b8"/>
    </marker>
    <marker id="arr-b" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="200" y1="25" x2="200" y2="270" class="divider"/>

  <!-- REACT SIDE -->
  <text x="100" y="18" text-anchor="middle" class="title">React</text>

  <!-- Server -->
  <rect x="15" y="30" width="70" height="28" rx="3" class="box"/>
  <text x="50" y="48" text-anchor="middle" class="label">Server</text>

  <!-- Bundle -->
  <rect x="100" y="30" width="70" height="28" rx="3" class="box-red"/>
  <text x="135" y="45" text-anchor="middle" class="label">Bundle</text>
  <text x="135" y="55" text-anchor="middle" class="sub">150KB</text>

  <path d="M 85 44 L 100 44" class="arrow"/>

  <!-- Parse -->
  <rect x="15" y="75" width="70" height="28" rx="3" class="box"/>
  <text x="50" y="93" text-anchor="middle" class="label">Parse JS</text>
  <path d="M 135 58 L 135 68 L 50 68 L 50 75" class="arrow"/>

  <!-- VDOM -->
  <rect x="100" y="75" width="70" height="28" rx="3" class="box"/>
  <text x="135" y="93" text-anchor="middle" class="label">Build VDOM</text>
  <path d="M 85 89 L 100 89" class="arrow"/>

  <!-- Diff -->
  <rect x="15" y="120" width="70" height="28" rx="3" class="box"/>
  <text x="50" y="138" text-anchor="middle" class="label">Diff/Reconcile</text>
  <path d="M 135 103 L 135 113 L 50 113 L 50 120" class="arrow"/>

  <!-- Hydrate -->
  <rect x="100" y="120" width="70" height="28" rx="3" class="box-red"/>
  <text x="135" y="135" text-anchor="middle" class="label">Hydrate</text>
  <text x="135" y="145" text-anchor="middle" class="sub">blocking</text>
  <path d="M 85 134 L 100 134" class="arrow"/>

  <!-- DOM -->
  <rect x="55" y="165" width="70" height="28" rx="3" class="box"/>
  <text x="90" y="183" text-anchor="middle" class="label">DOM Update</text>
  <path d="M 135 148 L 135 158 L 90 158 L 90 165" class="arrow"/>

  <!-- Time -->
  <text x="90" y="210" text-anchor="middle" class="sub">~300-500ms TTI</text>

  <!-- AETHER SIDE -->
  <text x="300" y="18" text-anchor="middle" class="title">Aether</text>

  <!-- Edge -->
  <rect x="215" y="30" width="70" height="28" rx="3" class="box-blue"/>
  <text x="250" y="48" text-anchor="middle" class="label">Edge/Agent</text>

  <!-- Kernel -->
  <rect x="300" y="30" width="70" height="28" rx="3" class="box-blue"/>
  <text x="335" y="45" text-anchor="middle" class="label">Kernel</text>
  <text x="335" y="55" text-anchor="middle" class="sub">2KB</text>

  <!-- SSE arrow -->
  <path d="M 285 44 L 300 44" class="arrow-blue"/>
  <text x="292" y="38" text-anchor="middle" class="sub" style="fill:#0ea5e9">SSE</text>

  <!-- CSS Inject -->
  <rect x="215" y="85" width="70" height="28" rx="3" class="box-green"/>
  <text x="250" y="103" text-anchor="middle" class="label">CSS Vars</text>
  <path d="M 335 58 L 335 75 L 250 75 L 250 85" class="arrow"/>

  <!-- Content -->
  <rect x="300" y="85" width="70" height="28" rx="3" class="box-green"/>
  <text x="335" y="103" text-anchor="middle" class="label">Content</text>
  <path d="M 250 113 L 250 123 L 335 123 L 335 113" class="arrow"/>

  <!-- DOM -->
  <rect x="255" y="140" width="70" height="28" rx="3" class="box-green"/>
  <text x="290" y="158" text-anchor="middle" class="label">DOM Update</text>
  <path d="M 290 123 L 290 140" class="arrow"/>

  <!-- Time -->
  <text x="290" y="185" text-anchor="middle" class="sub">&lt;50ms TTI</text>

  <!-- Legend -->
  <rect x="220" y="220" width="12" height="12" rx="2" class="box-red"/>
  <text x="237" y="230" class="sub">Blocking</text>
  <rect x="280" y="220" width="12" height="12" rx="2" class="box-green"/>
  <text x="297" y="230" class="sub">Non-blocking</text>
  <rect x="345" y="220" width="12" height="12" rx="2" class="box-blue"/>
  <text x="362" y="230" class="sub">Streaming</text>
</svg>