<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | React Only (No Jump-in)</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <!-- Performance timing display -->
  <div class="timing-banner" id="timing-banner">
    <span class="timing-label">Time to Content:</span>
    <span class="timing-value" id="timing-value">measuring...</span>
  </div>

  <div id="root">
    <!--
      WITHOUT AETHER: This div is EMPTY until React loads.

      The user sees NOTHING for 1000-2000ms while:
      1. React bundle downloads (~140KB)
      2. Babel transpiles JSX
      3. React parses component tree
      4. React hydrates/renders
      5. fetch() retrieves data
      6. setState triggers re-render
      7. Content finally appears
    -->
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Record when content becomes visible
    const startTime = performance.now();

    function StatsCard({ label, value, trend, color }) {
      return (
        <div className="stats-card" style={{ '--card-accent': color }}>
          <div className="stats-label">{label}</div>
          <div className="stats-value">{value}</div>
          <div className="stats-trend" data-trend={trend > 0 ? 'up' : 'down'}>
            {trend > 0 ? '↑' : '↓'} {Math.abs(trend)}%
          </div>
        </div>
      );
    }

    function ActivityItem({ action, user, time }) {
      return (
        <div className="activity-item">
          <div className="activity-dot"></div>
          <div className="activity-content">
            <span className="activity-action">{action}</span>
            <span className="activity-user">{user}</span>
          </div>
          <span className="activity-time">{time}</span>
        </div>
      );
    }

    function Dashboard() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Simulate API fetch (typical React pattern)
        const fetchData = async () => {
          // Artificial delay to simulate real-world API latency
          await new Promise(resolve => setTimeout(resolve, 300));

          const response = await fetch('/api/dashboard');
          const result = await response.json();
          setData(result);
          setLoading(false);

          // Record time to content
          const endTime = performance.now();
          const elapsed = Math.round(endTime - startTime);
          document.getElementById('timing-value').textContent = `${elapsed}ms`;
          document.getElementById('timing-banner').classList.add('complete');
        };

        fetchData();
      }, []);

      if (loading) {
        return (
          <div className="dashboard">
            <header className="dashboard-header">
              <h1>Analytics Dashboard</h1>
              <span className="mode-badge react">React Only</span>
            </header>
            <div className="loading-state">
              <div className="spinner"></div>
              <p>Loading dashboard data...</p>
              <p className="loading-subtext">
                Waiting for: React bundle → Parse → Hydrate → Fetch → Render
              </p>
            </div>
          </div>
        );
      }

      return (
        <div className="dashboard">
          <header className="dashboard-header">
            <h1>Analytics Dashboard</h1>
            <span className="mode-badge react">React Only</span>
          </header>

          <section className="stats-grid">
            <StatsCard label="Total Users" value={data.users} trend={12} color="#3b82f6" />
            <StatsCard label="Revenue" value={data.revenue} trend={8} color="#22c55e" />
            <StatsCard label="Orders" value={data.orders} trend={-3} color="#f59e0b" />
            <StatsCard label="Conversion" value={data.conversion} trend={5} color="#8b5cf6" />
          </section>

          <section className="activity-section">
            <h2>Recent Activity</h2>
            <div className="activity-list">
              {data.activities.map((activity, i) => (
                <ActivityItem key={i} {...activity} />
              ))}
            </div>
          </section>

          <footer className="dashboard-footer">
            <div className="execution-model">
              <strong>Execution Path:</strong>
              <code>Bundle (140KB) → Parse → Hydrate → Fetch → setState → Render</code>
            </div>
          </footer>
        </div>
      );
    }

    // Mount React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
