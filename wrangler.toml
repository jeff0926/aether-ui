name = "aether-ui"
main = "edge/cloudflare-worker.js"
compatibility_date = "2024-01-01"

[site]
bucket = "./dist"

[vars]
ENVIRONMENT = "production"

# KV namespace for state caching (create via wrangler kv:namespace create)
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-namespace-id"

[build]
command = "npm run build"

[dev]
port = 8787
local_protocol = "http"
